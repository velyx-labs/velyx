title: "Show and tell"
labels:
  - showcase
body:
  - type: markdown
    attributes:
      value: |
        Share how you are using the CLI, custom workflows, or interesting generated setups.
  - type: textarea
    id: summary
    attributes:
      label: What you built
      description: Describe the setup or workflow.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Share commands, screenshots, or lessons learned.
